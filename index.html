<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>FitnessOS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <header class="top-bar">
        <h1>FitnessOS</h1>
      </header>

      <main class="view-stack" id="viewStack" aria-live="polite">
        <section class="view is-active" data-view="dashboard" aria-labelledby="tab-dashboard">
          <h2>Dashboard</h2>
          <p>Overview and quick stats layout placeholder.</p>
        </section>

        <section class="view" data-view="workout" aria-labelledby="tab-workout" hidden>
          <h2>Workout</h2>
          <p>Workout session layout placeholder.</p>
        </section>

        <section class="view" data-view="training" aria-labelledby="tab-training" hidden>
          <h2>Training</h2>
          <p>Training plan layout placeholder.</p>
        </section>

        <section class="view" data-view="exercises" aria-labelledby="tab-exercises" hidden>
          <div class="exercise-header">
            <h2>Exercises</h2>
            <button id="addExerciseBtn" class="btn btn-primary" type="button">Add Exercise</button>
          </div>

          <p id="exerciseEmptyState" class="empty-state" hidden>No exercises yet</p>

          <ul id="exerciseList" class="exercise-list" aria-live="polite"></ul>

          <form id="exerciseForm" class="exercise-form" autocomplete="off" novalidate hidden>
            <h3 id="exerciseFormTitle">Add Exercise</h3>

            <label class="field-label" for="exerciseName">Name</label>
            <input id="exerciseName" name="name" type="text" required placeholder="e.g., Push-Up" />

            <label class="field-label" for="exercisePrimaryMuscle">Primary muscle</label>
            <select id="exercisePrimaryMuscle" name="primaryMuscle" required>
              <option value="">Select primary muscle</option>
              <option value="Chest">Chest</option>
              <option value="Back">Back</option>
              <option value="Shoulders">Shoulders</option>
              <option value="Biceps">Biceps</option>
              <option value="Triceps">Triceps</option>
              <option value="Quads">Quads</option>
              <option value="Hamstrings">Hamstrings</option>
              <option value="Glutes">Glutes</option>
              <option value="Core">Core</option>
              <option value="Calves">Calves</option>
            </select>

            <label class="field-label" for="exerciseSecondaryMuscles">Secondary muscles</label>
            <select id="exerciseSecondaryMuscles" name="secondaryMuscles" multiple>
              <option value="Chest">Chest</option>
              <option value="Back">Back</option>
              <option value="Shoulders">Shoulders</option>
              <option value="Biceps">Biceps</option>
              <option value="Triceps">Triceps</option>
              <option value="Quads">Quads</option>
              <option value="Hamstrings">Hamstrings</option>
              <option value="Glutes">Glutes</option>
              <option value="Core">Core</option>
              <option value="Calves">Calves</option>
            </select>

            <label class="field-label" for="exerciseEquipment">Equipment</label>
            <select id="exerciseEquipment" name="equipment" multiple>
              <option value="Bodyweight">Bodyweight</option>
              <option value="Dumbbell">Dumbbell</option>
              <option value="Barbell">Barbell</option>
              <option value="Kettlebell">Kettlebell</option>
              <option value="Cable">Cable</option>
              <option value="Resistance Band">Resistance Band</option>
              <option value="Machine">Machine</option>
              <option value="Bench">Bench</option>
              <option value="Pull-Up Bar">Pull-Up Bar</option>
            </select>

            <label class="field-label" for="exerciseNotes">Notes</label>
            <textarea id="exerciseNotes" name="notes" rows="3" placeholder="Optional coaching notes"></textarea>

            <label class="field-label" for="exerciseBreathing">Breathing instructions</label>
            <textarea id="exerciseBreathing" name="breathing" rows="2" placeholder="Optional breathing cues"></textarea>

            <label class="field-label" for="exerciseVideoUrl">Video guide URL</label>
            <input id="exerciseVideoUrl" name="videoUrl" type="text" placeholder="https://example.com/video" />

            <div class="field-row">
              <div>
                <label class="field-label" for="exerciseMinReps">Min reps</label>
                <input id="exerciseMinReps" name="minReps" type="number" min="0" placeholder="0" />
              </div>
              <div>
                <label class="field-label" for="exerciseMaxReps">Max reps</label>
                <input id="exerciseMaxReps" name="maxReps" type="number" min="0" placeholder="0" />
              </div>
            </div>

            <p id="exerciseFormError" class="form-error" hidden></p>

            <div class="form-actions">
              <button id="exerciseCancelBtn" class="btn" type="button">Cancel</button>
              <button id="exerciseSaveBtn" class="btn btn-primary" type="submit">Save Exercise</button>
            </div>
          </form>
        </section>

        <section class="view" data-view="settings" aria-labelledby="tab-settings" hidden>
          <h2>Settings</h2>
          <p>Settings layout placeholder.</p>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Primary">
        <button id="tab-dashboard" class="tab is-active" type="button" data-tab="dashboard" aria-controls="viewStack" aria-current="page">
          Dashboard
        </button>
        <button id="tab-workout" class="tab" type="button" data-tab="workout" aria-controls="viewStack">
          Workout
        </button>
        <button id="tab-training" class="tab" type="button" data-tab="training" aria-controls="viewStack">
          Training
        </button>
        <button id="tab-exercises" class="tab" type="button" data-tab="exercises" aria-controls="viewStack">
          Exercises
        </button>
        <button id="tab-settings" class="tab" type="button" data-tab="settings" aria-controls="viewStack">
          Settings
        </button>
      </nav>
    </div>

    <script src="app.js"></script>
    <script src="storage.js"></script>
    <script src="exercises.js"></script>
  </body>
</html>
